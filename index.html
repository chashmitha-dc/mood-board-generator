<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mood Board Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="brand">
      <h1>Mood Board Generator</h1>
      <p class="subtitle">Tap the button to craft a new pastel vibe.</p>
    </header>

    <section class="card">
      <div class="mood" aria-live="polite">
        <div class="quote" id="quote">Press the button to reveal a mood.</div>
        <div class="palette" id="palette" aria-label="Color palette"></div>
        <div class="icons" id="icons" aria-label="Aesthetic icons">✨🎨🌸</div>
      </div>

      <button class="button" id="generateBtn" type="button">Generate Mood Board</button>
    </section>

    <footer class="footer">
      <span>✨ designed with pastel vibes</span>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
